name: Naver Archiver — 자동 크롤링·분석·발송

# KST 01:00 / 07:00 / 12:00 / 17:00 실행 (= UTC 16:00 / 22:00 / 03:00 / 08:00)
# 01:00 회차는 과거글 백필 전용. 크롤 페이지 수·처리 건수는 routine.py에서
# 유한한 캡으로 제한되어 있음 (2026-07 GitHub Actions 무료 사용량을 이 회차가
# 무제한 크롤로 소진시켜 이후 모든 스케줄 실행이 즉시 실패했던 사고 재발 방지).
on:
  schedule:
    - cron: '0 16 * * *'   # 01:00 KST (백필 전용, 이메일 없음)
    - cron: '0 22 * * *'   # 07:00 KST
    - cron: '0 3  * * *'   # 12:00 KST
    - cron: '0 8  * * *'   # 17:00 KST
  workflow_dispatch:         # 수동 실행 버튼

permissions:
  contents: write            # seen.json 커밋을 위한 쓰기 권한

concurrency:
  group: naver-archiver-crawl
  cancel-in-progress: true   # 겹치는 실행이 Actions 분(分)을 이중으로 태우지 않도록

jobs:
  crawl-analyze-send:
    runs-on: ubuntu-latest
    timeout-minutes: 30      # routine.py 쪽 캡으로 정상 종료되는 것이 기본, 이건 안전망

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements_cloud.txt

      - name: Install dependencies
        run: pip install -r requirements_cloud.txt

      - name: Run routine
        run: python routine.py
        env:
          ARCHIVER_BACKFILL:            ${{ (github.event_name == 'schedule' && github.event.schedule == '0 16 * * *') && '1' || '0' }}
          GEMINI_API_KEY:               ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2:             ${{ secrets.GEMINI_API_KEY_2 }}
          ANTHROPIC_API_KEY:            ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_COOKIES_JSON:           ${{ secrets.NAVER_COOKIES_JSON }}
          GMAIL_FROM:                   desmager@gmail.com
          GMAIL_TO:                     desmager@gmail.com
          GMAIL_APP_PASSWORD:           ${{ secrets.GMAIL_APP_PASSWORD }}
          GDRIVE_FOLDER_ID:             ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_REFRESH_TOKEN:         ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_CLIENT_ID:             ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET:         ${{ secrets.GDRIVE_CLIENT_SECRET }}

      - name: Commit state files
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add seen.json
          if [ -f last_email_at.json ]; then git add last_email_at.json; fi
          git diff --cached --quiet || git commit -m "chore: update seen URLs / last email timestamp [skip ci]"
          git push 2>/dev/null || true
